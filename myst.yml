version: 1
project:
  title: PRFM
  authors:
    - name: Chang-Goo Kim
    - name: Eve Ostriker
  github: https://github.com/changgoo/PRFM
  bibliography:
    - book/references.bib
  execute:
    execute_notebooks: cache
    exclude:
      - book/prfm_phangs.ipynb
  toc:
    - file: book/intro
    - title: PRFM primer
      children:
        - file: book/vertical-de
        - file: book/feedback-yield
        - file: book/equation_of_state
        - file: book/reference
    - title: Example Notebooks
      children:
        - file: book/prfm
        - file: book/prfm_sims
        - file: book/prfm_tng
        - file: book/prfm_phangs
    - title: Code package
      children:
        - file: book/api
site:
  template: book-theme
